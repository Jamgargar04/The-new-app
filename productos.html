<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCorp - Productos y Servicios</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar" id="navbar"></nav>

  <div class="page-container">
    <div class="page-header">
      <div>
        <h1>Productos y Servicios</h1>
        <p>Catálogo de la empresa. Los administradores pueden crear, editar y eliminar.</p>
      </div>
      <button class="btn btn-primary" id="btn-nuevo" onclick="openModal()">+ Nuevo producto</button>
    </div>

    <div class="cards-grid" id="productos-grid"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Nuevo producto</h2>
      <form id="form-producto">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required>
        </div>
        <div class="field">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" rows="3" required></textarea>
        </div>
        <div class="field">
          <label for="precio">Precio (USD)</label>
          <input type="number" id="precio" min="0" step="0.01" required>
        </div>
        <div class="field">
          <label for="icono">Ícono (emoji, opcional)</label>
          <input type="text" id="icono" placeholder="📦" maxlength="4">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/productos.js"></script>
</body>
</html>
